name: CALAC CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore backend/CALAC.sln
    - name: Build
      run: dotnet build backend/CALAC.sln --no-restore
    - name: Test
      run: dotnet test backend/CALAC.sln --no-build --verbosity normal

  admin-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: admin/package-lock.json
    - name: Install dependencies
      run: cd admin && npm ci
    - name: Lint
      run: cd admin && npm run lint || true # oxlint is in devDeps
    - name: Build
      run: cd admin && npm run build

  mobile-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x mobile/android/gradlew
    - name: Build with Gradle
      run: cd mobile/android && ./gradlew assembleDebug
