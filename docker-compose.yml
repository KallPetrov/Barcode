services:
  postgres:
    image: postgres:16-alpine
    container_name: calac-postgres
    environment:
      POSTGRES_USER: calac
      POSTGRES_PASSWORD: calac123
      POSTGRES_DB: calac_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calac -d calac_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: calac-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
